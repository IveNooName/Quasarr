name: Build Docker Image

on:
  push:
    branches: [ "main" ] # Baut immer, wenn du etwas in den Haupt-Zweig hochlädst

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Build Wheel
        run: $HOME/.local/bin/uv build # Sicherer Pfad zur uv-Binary

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          # HINWEIS: IveNooName wurde hier zu ivenooname geändert
          tags: ghcr.io/ivenooname/mein-quasarr:latest
